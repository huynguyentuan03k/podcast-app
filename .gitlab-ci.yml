stages:
  - deploy

deploy:
  stage: deploy
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  before_script:
    - apk add --no-cache git openssh-client
    - export DOKKU_HOST="${DOKKU_HOST:-2402:800:6313:2782:24e:1ff:fea0:9aa2}"
    - export DOKKU_APP="${DOKKU_APP:-podcast-api}"
    - echo "Branch: ${CI_COMMIT_BRANCH}"
    - echo "Protected ref: ${CI_COMMIT_REF_PROTECTED}"
    - test -n "${DOKKU_DEPLOY_KEY:-}" || (echo "Missing DOKKU_DEPLOY_KEY. If this variable is protected, the branch must be protected too." && exit 1)
    - |
      mkdir -p ~/.ssh
      chmod 700 ~/.ssh
      if [ -f "$DOKKU_DEPLOY_KEY" ]; then
        cp "$DOKKU_DEPLOY_KEY" ~/.ssh/id_rsa
      else
        printf '%s\n' "$DOKKU_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/id_rsa
      fi
      chmod 600 ~/.ssh/id_rsa
      ssh-keygen -lf ~/.ssh/id_rsa
      DOKKU_SSH_HOST_RAW="$DOKKU_HOST"
      DOKKU_SSH_PORT="${DOKKU_PORT:-22}"
      DOKKU_REMOTE_USER="${DOKKU_USER:-dokku}"
      if printf '%s' "$DOKKU_SSH_HOST_RAW" | grep -q ':'; then
        DOKKU_SSH_HOST="[$DOKKU_SSH_HOST_RAW]"
      else
        DOKKU_SSH_HOST="$DOKKU_SSH_HOST_RAW"
      fi
      DOKKU_REMOTE_URL="ssh://${DOKKU_REMOTE_USER}@${DOKKU_SSH_HOST}:${DOKKU_SSH_PORT}/${DOKKU_APP}"
      ssh-keyscan -p "$DOKKU_SSH_PORT" -H "$DOKKU_SSH_HOST_RAW" >> ~/.ssh/known_hosts
      echo "Remote: $DOKKU_REMOTE_URL"
      git config --global user.email "${GITLAB_USER_EMAIL:-ci@example.com}"
      git config --global user.name "${GITLAB_USER_NAME:-GitLab CI}"
      git remote remove dokku || true
      git remote add dokku "$DOKKU_REMOTE_URL"
      git remote -v
  script:
    - GIT_SSH_COMMAND='ssh -vvv' git push --force dokku "HEAD:main"
