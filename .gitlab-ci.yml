stages:
  - deploy

deploy:
  stage: deploy
  image: alpine:3.20

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never

  before_script:
    - apk add --no-cache git openssh-client
    - export DOKKU_HOST="192.168.1.21"
    - export DOKKU_APP="podcast-api"
    - export DOKKU_REMOTE="dokku@${DOKKU_HOST}:${DOKKU_APP}"

    - |
      echo "Branch: ${CI_COMMIT_BRANCH}"
      echo "Dokku remote: ${DOKKU_REMOTE}"

    - |
      if [ -z "${DOKKU_DEPLOY_KEY:-}" ]; then
        echo "Missing DOKKU_DEPLOY_KEY"
        exit 1
      fi

    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh

    - |
      if [ -f "$DOKKU_DEPLOY_KEY" ]; then
        cp "$DOKKU_DEPLOY_KEY" ~/.ssh/id_rsa
      else
        printf '%s\n' "$DOKKU_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/id_rsa
      fi

    - chmod 600 ~/.ssh/id_rsa
    - ssh-keygen -lf ~/.ssh/id_rsa
    - ssh-keyscan -H "$DOKKU_HOST" >> ~/.ssh/known_hosts

    - git config --global user.email "${GITLAB_USER_EMAIL:-ci@example.com}"
    - git config --global user.name "${GITLAB_USER_NAME:-GitLab CI}"

    - git remote remove dokku 2>/dev/null || true
    - git remote add dokku "$DOKKU_REMOTE"
    - git remote -v

    - ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -i ~/.ssh/id_rsa dokku@"$DOKKU_HOST" version

  script:
    - GIT_SSH_COMMAND='ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes' git push --force dokku HEAD:main
