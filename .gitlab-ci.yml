stages:
  - deploy

deploy:
  stage: deploy
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  before_script:
    - apk add --no-cache git openssh-client
    - export DOKKU_HOST="${DOKKU_SSH_HOST:-${DOKKU_HOST:-}}"
    - export DOKKU_APP="${DOKKU_APP_NAME:-${DOKKU_APP:-}}"
    - test -n "${DOKKU_HOST:-}" || (echo "Missing DOKKU_SSH_HOST or DOKKU_HOST" && exit 1)
    - test -n "${DOKKU_APP:-}" || (echo "Missing DOKKU_APP_NAME or DOKKU_APP" && exit 1)
    - test -n "${DOKKU_SSH_PRIVATE_KEY:-}" || (echo "Missing DOKKU_SSH_PRIVATE_KEY" && exit 1)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - |
      if [ -f "$DOKKU_SSH_PRIVATE_KEY" ]; then
        cp "$DOKKU_SSH_PRIVATE_KEY" ~/.ssh/id_rsa
      else
        printf '%s\n' "$DOKKU_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
      fi
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -p "${DOKKU_SSH_PORT:-22}" -H "$DOKKU_HOST" >> ~/.ssh/known_hosts
    - git config --global user.email "${GITLAB_USER_EMAIL:-ci@example.com}"
    - git config --global user.name "${GITLAB_USER_NAME:-GitLab CI}"
    - git remote add dokku "ssh://dokku@${DOKKU_HOST}:${DOKKU_SSH_PORT:-22}/${DOKKU_APP}"
  script:
    - git push --force dokku "HEAD:main"
