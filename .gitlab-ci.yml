stages:
  - deploy

deploy:
  stage: deploy
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  before_script:
    - apk add --no-cache git openssh-client
    - test -n "${DOKKU_REMOTE_URL:-}" || (echo "Missing DOKKU_REMOTE_URL" && exit 1)
    - test -n "${DOKKU_SSH_PRIVATE_KEY:-}" || (echo "Missing DOKKU_SSH_PRIVATE_KEY" && exit 1)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - |
      if [ -f "$DOKKU_SSH_PRIVATE_KEY" ]; then
        cp "$DOKKU_SSH_PRIVATE_KEY" ~/.ssh/id_rsa
      else
        printf '%s\n' "$DOKKU_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
      fi
    - chmod 600 ~/.ssh/id_rsa
    - |
      DOKKU_SSH_HOST="$(printf '%s' "$DOKKU_REMOTE_URL" | sed -E 's#^ssh://[^@]+@([^:/]+).*$#\1#; s#^([^@:/]+@)?([^:/]+).*$#\2#')"
      DOKKU_SSH_PORT="$(printf '%s' "$DOKKU_REMOTE_URL" | sed -nE 's#^ssh://[^@]+@[^:/]+:([0-9]+)/.*$#\1#p')"
      DOKKU_SSH_PORT="${DOKKU_SSH_PORT:-22}"
      ssh-keyscan -p "$DOKKU_SSH_PORT" -H "$DOKKU_SSH_HOST" >> ~/.ssh/known_hosts
    - git config --global user.email "${GITLAB_USER_EMAIL:-ci@example.com}"
    - git config --global user.name "${GITLAB_USER_NAME:-GitLab CI}"
    - git remote add dokku "$DOKKU_REMOTE_URL"
  script:
    - git push --force dokku "HEAD:main"
