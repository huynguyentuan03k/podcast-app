stages:
  - deploy

deploy:
  stage: deploy
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  before_script:
    - apk add --no-cache git openssh-client
    - export DOKKU_HOST="${DOKKU_HOST:-2402:800:6313:2782:24e:1ff:fea0:9aa2}"
    - export DOKKU_APP="${DOKKU_APP:-podcast-api}"
    - echo "Branch: ${CI_COMMIT_BRANCH}"
    - echo "Protected ref: ${CI_COMMIT_REF_PROTECTED}"
    - |
      if [ -z "${DOKKU_DEPLOY_KEY:-}" ]; then
        echo "Missing DOKKU_DEPLOY_KEY"
        exit 1
      fi
    - |
      mkdir -p ~/.ssh
      chmod 700 ~/.ssh
      if [ -f "$DOKKU_DEPLOY_KEY" ]; then
        cp "$DOKKU_DEPLOY_KEY" ~/.ssh/id_rsa
      else
        printf '%s\n' "$DOKKU_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/id_rsa
      fi
      chmod 600 ~/.ssh/id_rsa
      ssh-keygen -lf ~/.ssh/id_rsa
    - |
      DOKKU_SSH_PORT="${DOKKU_PORT:-22}"
      ssh-keyscan -p "$DOKKU_SSH_PORT" -H "$DOKKU_HOST" >> ~/.ssh/known_hosts
      echo "SSH host: $DOKKU_HOST"
      echo "SSH port: $DOKKU_SSH_PORT"
      echo "App: $DOKKU_APP"
      echo "Deploy key file: ~/.ssh/id_rsa"
    - git config --global user.email "${GITLAB_USER_EMAIL:-ci@example.com}"
    - git config --global user.name "${GITLAB_USER_NAME:-GitLab CI}"
    - git remote remove dokku 2>/dev/null || true
    - git remote add dokku "ssh://dokku@${DOKKU_HOST}:${DOKKU_PORT:-22}/${DOKKU_APP}"
    - git remote -v
    - ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -i ~/.ssh/id_rsa -p "${DOKKU_PORT:-22}" dokku@"$DOKKU_HOST" version
  script:
    - GIT_SSH_COMMAND='ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes' git push --force dokku "HEAD:main"
