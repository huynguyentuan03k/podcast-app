stages:
  - deploy

deploy_to_dokku:
  stage: deploy
  tags:
    - hp70602-runner
  before_script:
    # 1. Cài đặt gói SSH
    - apk update && apk add git openssh-client

    # 2. Tạo thư mục cấu hình bảo mật
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh

    # 3. Ghi Key vào file (Sử dụng dấu ngoặc kép và -e để nhận diện xuống dòng)
    - echo -e "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa

    # 4. Kích hoạt Agent và add key vào hệ thống
    - eval $(ssh-agent -s)
    - ssh-add ~/.ssh/id_rsa

    # 5. Quét nhận diện máy chủ Dokku
    - ssh-keyscan -H $DELL_SERVER_IP >> ~/.ssh/known_hosts
  script:
    - echo "--- BẮT ĐẦU QUY TRÌNH DEPLOY LÊN DOKKU ---"
    - git remote remove dokku || true
    - git remote add dokku dokku@$DELL_SERVER_IP:podcast-api
    - git push dokku HEAD:refs/heads/master --force
    - echo "--- DEPLOY THÀNH CÔNG! DOKKU ĐANG XỬ LÝ KHỞI CHẠY NGẦM ---"
  only:
    - main
